<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .password-container { position: relative; }
        .password-toggle { 
            position: absolute; 
            right: 0.75rem; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer; 
            color: #6b7280; 
        }
        .password-toggle:hover { color: #374151; }
    </style>
</head>
<body class="min-h-screen text-gray-800">

    <!-- ========================================== -->
    <!-- HALAMAN: LOGIN & REGISTER -->
    <!-- ========================================== -->
    <div id="page-auth" class="hidden flex items-center justify-center min-h-screen p-4 fade-in">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <h1 id="auth-title" class="text-3xl font-bold text-center mb-6">Masuk</h1>
            <div id="auth-msg" class="hidden mb-4 p-3 rounded text-sm text-center"></div>
            
            <form id="form-auth" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Email</label>
                    <input type="email" id="auth-email" required class="w-full p-2 border rounded mt-1 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium">Password</label>
                    <div class="password-container mt-1">
                        <input type="password" id="auth-password" required class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500 pr-10">
                        <button type="button" class="password-toggle focus:outline-none" onclick="togglePasswordVisibility('auth-password', this)">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.188-1.583c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="btn-auth-submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">Masuk</button>
            </form>
            
            <p class="mt-6 text-center text-sm">
                <span id="auth-switch-text">Belum punya akun?</span>
                <a href="javascript:void(0)" id="auth-switch-link" class="text-blue-600 font-bold hover:underline">Daftar</a>
            </p>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- HALAMAN: DASHBOARD ADMIN -->
    <!-- ========================================== -->
    <div id="page-app" class="hidden min-h-screen bg-gray-50 fade-in">
        <!-- Navbar -->
        <nav class="bg-blue-600 text-white p-4 shadow-lg">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="font-bold text-xl">Supabase App</div>
                <div class="flex gap-4 items-center">
                    <span id="nav-user-email" class="text-sm hidden sm:block opacity-90"></span>
                    <button id="btn-logout" class="bg-red-500 px-3 py-1 rounded text-sm hover:bg-red-600 transition">Keluar</button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6">
            <!-- Section Dashboard: Tabel User -->
            <div id="section-dashboard" class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-bold text-gray-800">Manajemen Pengguna</h2>
                        <button onclick="fetchUsers()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-3 py-1 rounded text-sm font-medium transition flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            Refresh
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="p-3 border-b font-semibold">Email</th>
                                    <th class="p-3 border-b font-semibold text-center w-48">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="users-list">
                                <tr><td colspan="2" class="p-4 text-center text-gray-500">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kbhfsclnlcetsckdxcxl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFUcdEDvO1cDRfoNTMEuyw_hDMbx5i3';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isRegisterMode = false;

        // --- FUNGSI TOGGLE VISIBILITAS PASSWORD ---
        function togglePasswordVisibility(inputId, btnElement) {
            const inputField = document.getElementById(inputId);
            const isPassword = inputField.type === 'password';
            
            inputField.type = isPassword ? 'text' : 'password';
            
            if (isPassword) {
                btnElement.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                `;
            } else {
                btnElement.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.188-1.583c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29"></path>
                    </svg>
                `;
            }
        }

        // --- ROUTING SEDERHANA ---
        async function checkRoute() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (!session) {
                document.getElementById('page-auth').classList.remove('hidden');
                document.getElementById('page-app').classList.add('hidden');
                return;
            }

            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-app').classList.remove('hidden');
            
            // Tampilkan email user di navbar
            document.getElementById('nav-user-email').innerText = session.user.email;

            fetchUsers();
        }

        // --- AUTH LOGIC ---
        document.getElementById('auth-switch-link').onclick = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? 'Daftar' : 'Masuk';
            document.getElementById('btn-auth-submit').innerText = isRegisterMode ? 'Buat Akun' : 'Masuk';
            document.getElementById('auth-switch-text').innerText = isRegisterMode ? 'Sudah punya akun?' : 'Belum punya akun?';
            document.getElementById('auth-switch-link').innerText = isRegisterMode ? 'Login' : 'Daftar';
            document.getElementById('auth-msg').classList.add('hidden');
        };

        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');
            const btn = document.getElementById('btn-auth-submit');
            
            btn.disabled = true;
            btn.innerText = 'Memproses...';

            const { data, error } = isRegisterMode 
                ? await supabaseClient.auth.signUp({ email, password })
                : await supabaseClient.auth.signInWithPassword({ email, password });

            btn.disabled = false;
            btn.innerText = isRegisterMode ? 'Buat Akun' : 'Masuk';

            if (error) {
                msg.innerText = error.message;
                msg.className = "mb-4 p-3 rounded text-sm text-center bg-red-100 text-red-700";
                msg.classList.remove('hidden');
            } else {
                if (isRegisterMode && data.user) {
                     await supabaseClient.from('users').insert([{ id: data.user.id, email: email }]);
                }
                document.getElementById('form-auth').reset();
                const passInput = document.getElementById('auth-password');
                if(passInput.type === 'text') {
                    togglePasswordVisibility('auth-password', passInput.nextElementSibling);
                }
                checkRoute();
            }
        };

        // --- MANAJEMEN USER (ADMIN) ---
        async function fetchUsers() {
            const list = document.getElementById('users-list');
            list.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-gray-500">Memuat data...</td></tr>';
            
            const { data, error } = await supabaseClient.from('users').select('*');
            
            if (error) {
                list.innerHTML = `<tr><td colspan="2" class="p-4 text-center text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }

            if(data.length === 0) {
                 list.innerHTML = `<tr><td colspan="2" class="p-4 text-center text-gray-500">Belum ada data user.</td></tr>`;
                 return;
            }

            list.innerHTML = data.map(u => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-3 text-gray-800">${u.email}</td>
                    <td class="p-3 text-center space-x-2">
                        <button onclick="adminResetPw('${u.id}', '${u.email}')" class="bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded text-sm font-semibold hover:bg-blue-100 transition" title="Ubah Password">Ubah PW</button>
                        <button onclick="adminDeleteUser('${u.id}', '${u.email}')" class="bg-red-50 text-red-600 border border-red-200 px-3 py-1.5 rounded text-sm font-semibold hover:bg-red-100 transition" title="Hapus User">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        window.adminResetPw = async (id, email) => {
            const newPw = prompt(`Ubah password untuk:\n${email}\n\nMasukkan password baru (Min. 6 Karakter):`);
            if (!newPw) return; 
            if (newPw.length < 6) return alert("Password minimal 6 karakter!");
            
            const { error } = await supabaseClient.rpc('update_user_password_admin', { target_user_id: id, new_password: newPw });
            
            if (error) {
                alert("Gagal memproses!\nError: " + error.message);
            } else {
                alert("Password untuk " + email + " berhasil diubah!");
            }
        };

        window.adminDeleteUser = async (id, email) => {
            if (!confirm(`Hapus permanen user ${email}?\nData tidak dapat dikembalikan.`)) return;
            
            const { error } = await supabaseClient.rpc('delete_user_admin', { target_user_id: id });
            
            if (error) {
                 alert("Gagal menghapus!\nError: " + error.message);
            } else { 
                 fetchUsers(); 
            }
        };

        // --- LOGOUT ---
        document.getElementById('btn-logout').onclick = async () => {
            await supabaseClient.auth.signOut();
            checkRoute();
        };

        // Jalankan saat pertama dimuat
        checkRoute();
    </script>
</body>
</html>
